<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 MotoGP Schedule</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-bg: #ffffff;
            --card-dark-bg: #2a2a2a;
            --text-main: #000000;
            --text-light: #ffffff;
            --text-gray: #888888;
            --red: #e3001b;
            --font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
        }

        .header-container {
            background-color: #000;
            color: #fff;
            padding: 20px 40px;
            border-bottom: 4px solid var(--red);
            margin-bottom: 30px;
        }

        .header-container h1 {
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 0 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card.up-next {
            background-color: var(--card-dark-bg);
            color: var(--text-light);
        }

        .card.up-next .gray-text { color: #cccccc; }

        .card.live {
            border: 2px solid var(--red);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(227, 0, 27, 0.4);
        }

        .card.live:hover {
            transform: translateY(-3px);
        }

        .date-range {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card.up-next .date-range { color: #aaaaaa; }

        .flag {
            width: 20px;
            height: auto;
            display: inline-block;
            margin-bottom: 5px;
        }

        .country-title {
            font-size: 18px;
            font-weight: 900;
            margin: 0 0 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .race-num { font-weight: 300; }

        .sponsor-title {
            font-size: 10px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        .card.up-next .sponsor-title { color: #999999; }

        /* Labels */
        .status-label {
            position: absolute;
            top: 0;
            right: 0;
            padding: 4px 12px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom-left-radius: 8px;
            color: #fff;
        }

        .label-finished { background-color: #000; }
        .label-up-next { background-color: var(--red); }
        .label-live {
            background-color: var(--red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Modal / Iframe */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .iframe-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 600px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Updated Controls Layout to prevent blocking native player UI */
        .iframe-controls {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 15%, transparent 80%, rgba(0,0,0,0.7) 100%);
            opacity: 0;
            transition: opacity 0.3s;
            /* CRITICAL FIX: Let clicks pass through the invisible gradient to the video */
            pointer-events: none; 
        }

        .iframe-container:hover .iframe-controls {
            opacity: 1;
        }

        .source-btns {
            position: absolute;
            /* Raised from 25px to 70px to clear the video player's native play/volume bar */
            bottom: 70px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            /* Re-enable clicks ONLY for the buttons */
            pointer-events: auto; 
        }

        .source-btns button {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .source-btns button:hover, .source-btns button.active {
            background: var(--red);
            border-color: var(--red);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 2px solid #fff;
            color: #fff;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            /* Re-enable clicks ONLY for the button */
            pointer-events: auto; 
        }

        .close-btn:hover { background: var(--red); border-color: var(--red); }
        
        /* Utility for testing */
        .test-controls {
            padding: 0 40px;
            margin-bottom: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>2026 MotoGP Calendar</h1>
    </div>
    
    <div class="grid-container" id="schedule-grid"></div>

    <div class="modal" id="video-modal">
        <div class="iframe-container">
            <iframe id="video-frame" src="" allowfullscreen></iframe>
            
            <div class="iframe-controls">
                <div class="source-btns">
                    <button class="active" onclick="changeSource(1)">Source 1</button>
                    <button onclick="changeSource(2)">Source 2</button>
                    <button onclick="changeSource(3)">Source 3</button>
                </div>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
        </div>
    </div>
    <div class="test-controls">
        <label><input type="checkbox" id="forceLiveToggle"> <i>Developer Toggle: Force next event to be "LIVE" to test iframe functionality.</i></label>
    </div>

    <script>
        // Source URLs
        const sources = {
            1: "https://viewembed.ru/channel/TNTSports1[UK]",
            2: "https://viewembed.ru/channel/Fox501[Australia]",
            3: "https://viewembed.ru/channel/SuperSportMotorsport[SouthAfrica]"
        };

        const schedule = [
            { id: 1, start: '2026-02-27', end: '2026-03-01', flag: '🇹🇭', country: 'THAILAND', title: 'PT GRAND PRIX OF THAILAND' },
            { id: 2, start: '2026-03-20', end: '2026-03-22', flag: '🇧🇷', country: 'BRAZIL', title: 'ESTRELLA GALICIA 0,0 GRAND PRIX OF BRAZIL' },
            { id: 3, start: '2026-03-27', end: '2026-03-29', flag: '🇺🇸', country: 'USA', title: 'RED BULL GRAND PRIX OF THE UNITED STATES' },
            { id: 4, start: '2026-04-24', end: '2026-04-26', flag: '🇪🇸', country: 'SPAIN', title: 'ESTRELLA GALICIA 0,0 GRAND PRIX OF SPAIN' },
            { id: 5, start: '2026-05-08', end: '2026-05-10', flag: '🇫🇷', country: 'FRANCE', title: 'MICHELIN GRAND PRIX OF FRANCE' },
            { id: 6, start: '2026-05-15', end: '2026-05-17', flag: '🇪🇸', country: 'CATALONIA', title: 'MONSTER ENERGY GRAND PRIX OF CATALUNYA' },
            { id: 7, start: '2026-05-29', end: '2026-05-31', flag: '🇮🇹', country: 'ITALY', title: 'BREMBO GRAND PRIX OF ITALY' },
            { id: 8, start: '2026-06-05', end: '2026-06-07', flag: '🇭🇺', country: 'HUNGARY', title: 'GRAND PRIX OF HUNGARY' },
            { id: 9, start: '2026-06-19', end: '2026-06-21', flag: '🇨🇿', country: 'CZECHIA', title: 'GRAND PRIX OF CZECHIA' },
            { id: 10, start: '2026-06-26', end: '2026-06-28', flag: '🇳🇱', country: 'NETHERLANDS', title: 'GRAND PRIX OF THE NETHERLANDS' },
            { id: 11, start: '2026-07-10', end: '2026-07-12', flag: '🇩🇪', country: 'GERMANY', title: 'LIQUI MOLY GRAND PRIX OF GERMANY' },
            { id: 12, start: '2026-08-07', end: '2026-08-09', flag: '🇬🇧', country: 'GREAT BRITAIN', title: 'QATAR AIRWAYS GRAND PRIX OF GREAT BRITAIN' },
            { id: 13, start: '2026-08-28', end: '2026-08-30', flag: '🇪🇸', country: 'ARAGON', title: 'GRAND PRIX OF ARAGON' },
            { id: 14, start: '2026-09-11', end: '2026-09-13', flag: '🇸🇲', country: 'SAN MARINO', title: 'RED BULL GRAND PRIX OF SAN MARINO AND THE RIMINI RIVIERA' },
            { id: 15, start: '2026-09-18', end: '2026-09-20', flag: '🇦🇹', country: 'AUSTRIA', title: 'GRAND PRIX OF AUSTRIA' },
            { id: 16, start: '2026-10-02', end: '2026-10-04', flag: '🇯🇵', country: 'JAPAN', title: 'MOTUL GRAND PRIX OF JAPAN' },
            { id: 17, start: '2026-10-09', end: '2026-10-11', flag: '🇮🇩', country: 'INDONESIA', title: 'PERTAMINA GRAND PRIX OF INDONESIA' },
            { id: 18, start: '2026-10-23', end: '2026-10-25', flag: '🇦🇺', country: 'AUSTRALIA', title: 'GRAND PRIX OF AUSTRALIA' },
            { id: 19, start: '2026-10-30', end: '2026-11-01', flag: '🇲🇾', country: 'MALAYSIA', title: 'PETRONAS GRAND PRIX OF MALAYSIA' },
            { id: 20, start: '2026-11-06', end: '2026-11-08', flag: '🇶🇦', country: 'QATAR', title: 'QATAR AIRWAYS GRAND PRIX OF QATAR' },
            { id: 21, start: '2026-11-20', end: '2026-11-22', flag: '🇵🇹', country: 'PORTUGAL', title: 'REPSOL GRAND PRIX OF PORTUGAL' },
            { id: 22, start: '2026-11-27', end: '2026-11-29', flag: '🇪🇸', country: 'VALENCIA', title: 'MOTUL GRAND PRIX OF VALENCIA' }
        ];

        function formatDateString(startStr, endStr) {
            const start = new Date(startStr);
            const end = new Date(endStr);
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            
            const sDate = String(start.getDate()).padStart(2, '0');
            const sMonth = months[start.getMonth()];
            
            const eDate = String(end.getDate()).padStart(2, '0');
            const eMonth = months[end.getMonth()];

            return `${sDate} ${sMonth} - ${eDate} ${eMonth}`;
        }

        function renderCards(forceLive = false) {
            const grid = document.getElementById('schedule-grid');
            grid.innerHTML = '';

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            
            let foundUpcoming = false;

            schedule.forEach(race => {
                const startDate = new Date(race.start).getTime();
                const endDate = new Date(race.end).getTime();

                let status = '';
                let labelHtml = '';
                let classList = 'card';
                let onclickEvent = '';

                if (endDate < today) {
                    classList += ' finished';
                    labelHtml = '<div class="status-label label-finished">FINISHED</div>';
                } else if (today >= startDate && today <= endDate) {
                    classList += ' live';
                    labelHtml = '<div class="status-label label-live">LIVE</div>';
                    onclickEvent = 'onclick="openLiveStream()"';
                } else if (!foundUpcoming) {
                    if (forceLive) {
                         classList += ' live';
                         labelHtml = '<div class="status-label label-live">LIVE</div>';
                         onclickEvent = 'onclick="openLiveStream()"';
                    } else {
                         classList += ' up-next';
                         labelHtml = '<div class="status-label label-up-next">UP NEXT</div>';
                    }
                    foundUpcoming = true; 
                }

                const cardHtml = `
                    <div class="${classList}" ${onclickEvent}>
                        ${labelHtml}
                        <div class="flag">${race.flag}</div>
                        <div class="date-range">${formatDateString(race.start, race.end)}</div>
                        <h2 class="country-title"><span class="race-num">${race.id}</span> ${race.country}</h2>
                        <div class="sponsor-title">${race.title}</div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        const modal = document.getElementById('video-modal');
        const iframe = document.getElementById('video-frame');
        const btns = document.querySelectorAll('.source-btns button');

        function openLiveStream() {
            modal.classList.add('active');
            changeSource(1);
        }

        function closeModal() {
            modal.classList.remove('active');
            iframe.src = ''; 
        }

        function changeSource(sourceNum) {
            iframe.src = sources[sourceNum];
            
            btns.forEach((btn, index) => {
                if(index + 1 === sourceNum) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.classList.contains('active')) {
                closeModal();
            }
        });

        document.getElementById('forceLiveToggle').addEventListener('change', (e) => {
            renderCards(e.target.checked);
        });

        renderCards();

    </script>
</body>
</html>
